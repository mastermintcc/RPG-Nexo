# Mutations for RPG Nexus

mutation CreateProfile($id: String!, $email: String!, $displayName: String, $role: String) @auth(level: USER) {
  profile_insert(data: {
    id: $id,
    email: $email,
    displayName: $displayName,
    role: $role
  })
}

mutation CreateInstance($name: String!, $description: String, $status: String, $maxPlayers: Int) @auth(level: USER) {
  instance_insert(data: {
    name: $name,
    description: $description,
    status: $status,
    maxPlayers: $maxPlayers,
    ownerId: "request.auth.uid"
  })
}

mutation UpdateInstance($id: UUID!, $name: String!, $description: String, $status: String, $maxPlayers: Int) @auth(level: USER) {
  instance_update(id: $id, data: {
    name: $name,
    description: $description,
    status: $status,
    maxPlayers: $maxPlayers
  })
}

mutation DeleteInstance($id: UUID!) @auth(level: USER) {
  instance_delete(id: $id)
}
